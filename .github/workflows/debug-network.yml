name: Debug network distances

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - name: Existing suite
        run: python -m pytest -q --ignore=tests/test_network_distance.py --ignore=tests/test_network_traversal.py --ignore=tests/test_network_distance_workspace.py
      - name: Exact distance tests
        run: python -m pytest -q tests/test_network_distance.py
      - name: Traversal tests
        run: python -m pytest -q tests/test_network_traversal.py
      - name: Workspace distance tests
        run: python -m pytest -q tests/test_network_distance_workspace.py
