name: Apply pyKDEX 0.0.8 patch

on:
  push:
    branches: [agent/spatial-boundary-anisotropy]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/spatial-boundary-anisotropy
          fetch-depth: 0
      - name: Verify and apply patch
        shell: bash
        run: |
          set -euo pipefail
          cat .tmp/pykdex008.part.00 .tmp/pykdex008.part.01 .tmp/pykdex008.part.02 > /tmp/pykdex008.patch.gz.b64
          echo "2c2cc2efbd316c0823c9135b563622f3f3ee1dd32ca02bfd3c2ce4c1baa95aed  /tmp/pykdex008.patch.gz.b64" | sha256sum -c -
          base64 --decode /tmp/pykdex008.patch.gz.b64 > /tmp/pykdex008.patch.gz
          gzip --decompress --stdout /tmp/pykdex008.patch.gz > /tmp/pykdex008.patch
          echo "8dd1d51c9b221a0096d8e34192556119f56bfbd04ff1ae2c8e6331bc1176d943  /tmp/pykdex008.patch" | sha256sum -c -
          git apply --check /tmp/pykdex008.patch
          git apply /tmp/pykdex008.patch
          rm -f .tmp/pykdex008.part.00 .tmp/pykdex008.part.01 .tmp/pykdex008.part.02
          rm -f .github/workflows/apply-pykdex-0.0.8.yml
          rm -f .github/workflows/export-source-0.0.8.yml
          rmdir .tmp 2>/dev/null || true
      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add spatial boundary correction and anisotropic KDE"
          git push origin HEAD:agent/spatial-boundary-anisotropy

# Maintainer-triggered rerun marker.
