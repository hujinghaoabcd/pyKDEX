name: Format NetworkKDE branch

on:
  push:
    branches: [agent/network-kde]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/network-kde
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install black isort
      - run: python -m black src tests tools examples
      - run: python -m isort src tests tools examples
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests tools examples
          git commit -m "Apply NetworkKDE code formatting"
          git push origin HEAD:agent/network-kde
