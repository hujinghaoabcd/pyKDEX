name: Export source 0.0.8

on:
  push:
    branches: [agent/spatial-boundary-anisotropy]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/spatial-boundary-anisotropy
      - uses: actions/upload-artifact@v4
        with:
          name: pykdex-source-0.0.8
          path: .
          include-hidden-files: true
          retention-days: 1
