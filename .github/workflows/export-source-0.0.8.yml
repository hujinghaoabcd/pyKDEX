name: Apply pyKDEX 0.0.8 source

on:
  push:
    branches: [agent/spatial-boundary-anisotropy]
  pull_request:
  workflow_dispatch:

concurrency:
  group: apply-pykdex-0.0.8
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/spatial-boundary-anisotropy
          fetch-depth: 0
      - name: Inspect staged patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .tmp/pykdex008.part.00 \
            .tmp/pykdex008.part.010 \
            .tmp/pykdex008.part.011 \
            .tmp/pykdex008.part.02 \
            > /tmp/pykdex008.patch.gz.b64
          {
            wc -c \
              .tmp/pykdex008.part.00 \
              .tmp/pykdex008.part.010 \
              .tmp/pykdex008.part.011 \
              .tmp/pykdex008.part.02 \
              /tmp/pykdex008.patch.gz.b64
            sha256sum \
              .tmp/pykdex008.part.00 \
              .tmp/pykdex008.part.010 \
              .tmp/pykdex008.part.011 \
              .tmp/pykdex008.part.02 \
              /tmp/pykdex008.patch.gz.b64
          } > /tmp/pykdex008-diagnostics.txt
      - name: Upload patch diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pykdex008-patch-diagnostics
          path: /tmp/pykdex008-diagnostics.txt
          retention-days: 1
      - name: Verify and apply source patch
        shell: bash
        run: |
          set -euo pipefail
          echo "2c2cc2efbd316c0823c9135b563622f3f3ee1dd32ca02bfd3c2ce4c1baa95aed  /tmp/pykdex008.patch.gz.b64" | sha256sum -c -
          base64 --decode /tmp/pykdex008.patch.gz.b64 > /tmp/pykdex008.patch.gz
          gzip --decompress --stdout /tmp/pykdex008.patch.gz > /tmp/pykdex008.patch
          echo "8dd1d51c9b221a0096d8e34192556119f56bfbd04ff1ae2c8e6331bc1176d943  /tmp/pykdex008.patch" | sha256sum -c -
          git apply --check \
            --exclude=.github/workflows/export-source-0.0.8.yml \
            /tmp/pykdex008.patch
          git apply \
            --exclude=.github/workflows/export-source-0.0.8.yml \
            /tmp/pykdex008.patch
          rm -f \
            .tmp/pykdex008.part.00 \
            .tmp/pykdex008.part.01 \
            .tmp/pykdex008.part.010 \
            .tmp/pykdex008.part.011 \
            .tmp/pykdex008.part.02
          rm -f .github/workflows/apply-pykdex-0.0.8.yml
          rm -f .github/workflows/export-source-0.0.8.yml
          rmdir .tmp 2>/dev/null || true
      - name: Commit source implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add spatial boundary correction and anisotropic KDE"
          git push origin HEAD:agent/spatial-boundary-anisotropy
