name: Format pyKDEX 0.0.7

on:
  push:
    branches: [agent/network-bandwidths]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/network-bandwidths
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip black isort
      - run: python -m black src tests tools examples
      - run: python -m isort src tests tools examples
      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/format-0.0.7.yml
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Format network bandwidth development unit'
          git push origin HEAD:agent/network-bandwidths
