name: Debug NetworkKDE

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  isolated-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - tests/test_network_propagation.py::test_junction_policy_weights_match_equal_split_definitions
          - tests/test_network_propagation.py::test_discontinuous_trace_splits_t_junction_into_two_equal_branches
          - tests/test_network_propagation.py::test_continuous_trace_adds_signed_reflection_at_degree_three_node
          - tests/test_network_propagation.py::test_continuous_policy_rejects_directed_metric_graphs
          - tests/test_network_propagation.py::test_path_safety_limit_fails_explicitly_on_repeated_ring_walks
    name: ${{ matrix.test }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - run: python -m pytest -q "${{ matrix.test }}"
