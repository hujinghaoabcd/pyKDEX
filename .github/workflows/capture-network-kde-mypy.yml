name: Capture NetworkKDE mypy

on:
  push:
    branches: [agent/network-kde]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/network-kde
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Capture mypy output
        run: |
          python -m mypy > MYPY_ERRORS.txt 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MYPY_ERRORS.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Capture NetworkKDE mypy diagnostics"
          git push origin HEAD:agent/network-kde
