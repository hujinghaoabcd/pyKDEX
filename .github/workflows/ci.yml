name: Fix pyKDEX 0.0.8 Ruff findings

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fix-pykdex-0.0.8-ruff
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/spatial-boundary-anisotropy
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Apply and verify safe Ruff fixes
        run: |
          python -m ruff check --fix src tests tools examples
          python -m ruff check src tests tools examples
      - name: Restore permanent CI and commit fixes
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Ruff findings in spatial KDE additions"
          git push origin HEAD:agent/spatial-boundary-anisotropy
