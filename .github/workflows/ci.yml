name: Format pyKDEX 0.0.8

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: format-pykdex-0.0.8
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/spatial-boundary-anisotropy
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Apply project formatting and update wheel smoke version
        shell: bash
        run: |
          set -euo pipefail
          python -m black src tests tools examples
          python -m isort src tests tools examples
          python - <<'PY'
          from pathlib import Path

          path = Path("tools/smoke_installed_distribution.py")
          text = path.read_text(encoding="utf-8")
          old = 'assert pykdex.__version__ == "0.0.7"'
          new = 'assert pykdex.__version__ == "0.0.8"'
          if old not in text:
              raise SystemExit("expected installed-wheel version assertion was not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Restore permanent CI and commit maintenance changes
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format spatial KDE additions and update wheel smoke test"
          git push origin HEAD:agent/spatial-boundary-anisotropy
