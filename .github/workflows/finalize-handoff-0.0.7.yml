name: Finalize pyKDEX 0.0.7 handoff

on:
  push:
    branches: [agent/network-bandwidths]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/network-bandwidths
          fetch-depth: 0
      - name: Finalize versioned handoff and validation records
        run: |
          python - <<'PY'
          from pathlib import Path

          old_final = """- Final version: pending clean CI
          - Final test count: pending clean CI
          - Final branch coverage: pending clean CI
          - Final CI run: pending clean CI
          - Merge commit: pending
          - Temporary workflow removal: pending"""
          new_final = """- Final version: `0.0.7`
          - Final test count: `137 passed`
          - Final branch coverage: `81.97%`
          - Final CI run: GitHub Actions run `#74` (`29902449039`), conclusion `success`
          - Merge commit: pending PR #6 squash merge
          - Temporary workflow removal: completed"""
          for filename in (
              "HANDOFF_0.0.7_NETWORK_BANDWIDTHS.md",
              "docs/development/handoff-0.0.7-network-bandwidths.md",
          ):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              if old_final not in text:
                  raise SystemExit(f"Expected finalization block not found in {filename}")
              path.write_text(text.replace(old_final, new_final, 1), encoding="utf-8")

          validation = Path("BASELINE_VALIDATION.md")
          text = validation.read_text(encoding="utf-8")
          old_validation = """## Current observed local validation

          - pytest: 129 passed;
          - branch coverage: 80.5%, above the required 80% minimum;
          - public API/example coverage: 70 symbols mapped;
          - source, tests, and examples compile successfully;
          - deterministic grid-network benchmark completed successfully.

          ## Required final release checks

          The following must be copied here after the final clean pull-request CI:

          - Black, isort, Ruff, and mypy;
          - MkDocs strict build;
          - wheel and sdist build and Twine metadata checks;
          - installed-wheel smoke test;
          - Linux, Windows, and macOS with Python 3.11-3.14;
          - final test and branch-coverage counts from GitHub Actions;
          - removal of temporary source-export and diagnostic workflows;
          - merge commit for PR #6."""
          new_validation = """## Final observed validation

          - pytest: 137 passed;
          - branch coverage: 81.97%, above the required 80% minimum;
          - public API/example coverage: 70 symbols mapped;
          - Black, isort, Ruff, and mypy: passed;
          - MkDocs strict build: passed;
          - wheel, sdist, Twine metadata, and installed-wheel smoke tests: passed;
          - Linux, Windows, and macOS passed with Python 3.11-3.14;
          - deterministic grid-network benchmark completed successfully;
          - final pull-request CI: run #74 (29902449039), conclusion success;
          - temporary patch, source-export, formatter, and diagnostic workflows: removed;
          - PR #6 merge commit: pending squash merge."""
          if old_validation not in text:
              raise SystemExit("Expected validation block not found")
          validation.write_text(
              text.replace(old_validation, new_validation, 1), encoding="utf-8"
          )
          PY
      - name: Remove temporary workflow and commit
        run: |
          rm -f .github/workflows/finalize-handoff-0.0.7.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Finalize pyKDEX 0.0.7 handoff and validation records'
          git push origin HEAD:agent/network-bandwidths
