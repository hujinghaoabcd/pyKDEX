name: Apply pyKDEX 0.0.7 source

on:
  push:
    branches: [agent/network-bandwidths]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/network-bandwidths
          fetch-depth: 0
      - name: Verify and apply reviewed patch
        shell: bash
        run: |
          cat .github/patches/chunk* > /tmp/pykdex-007.patch.gz.b64
          printf '%s  %s\n' \
            'bbf1bb941a572bdc537116794b9f3a779382f9ed0c75d21296fe105153e16d10' \
            '/tmp/pykdex-007.patch.gz.b64' | sha256sum --check --strict
          base64 --decode /tmp/pykdex-007.patch.gz.b64 \
            | gzip --decompress > /tmp/pykdex-007.patch
          printf '%s  %s\n' \
            'ee537d89a9b2820665b1bbbd314f8323d1c9b268e90525b0202a7b610f20a860' \
            '/tmp/pykdex-007.patch' | sha256sum --check --strict
          git apply --check /tmp/pykdex-007.patch
          git apply --index /tmp/pykdex-007.patch
          rm -rf .github/patches
          rm -f .github/workflows/apply-0.0.7.yml
          rm -f .github/workflows/export-source.yml
          git add -A
      - name: Commit completed development unit
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Add network bandwidth selection and adaptive NetworkKDE'
          git push origin HEAD:agent/network-bandwidths
